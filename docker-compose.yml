version: "3.9"

services:

  db:
    image: postgres:15
    container_name: industrial_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: industrial
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ingestion/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    
  ingestion:
    build: ./ingestion
    container_name: ingestion_service
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: industrial
      DB_USER: admin
      DB_PASSWORD: admin

  generator:
    build: ./data_generator
    container_name: generator_service
    depends_on:
      - ingestion
    environment:
      API_URL: http://ingestion:8000/ingest

volumes:
  pgdata: