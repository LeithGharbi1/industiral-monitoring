version: "3.9"

services:

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
      REDIS_URL: redis://redis:6379   # ADD THIS
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    working_dir: /app
    environment:
      PYTHONPATH: /app/src
      REDIS_URL: redis://redis:6379   # ADD THIS
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - redis

  generator:
    build:
      context: .
      dockerfile: docker/Dockerfile.generator
    working_dir: /app
    environment:
      PYTHONPATH: /app/src
      API_URL: http://api:8000/ingest
    depends_on:
      - api