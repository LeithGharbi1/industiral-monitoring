name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 👈 add this

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest || true

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and tag images
        run: |
          docker build -f docker/Dockerfile.api -t ghcr.io/${{ github.repository }}/api:latest .
          docker build -f docker/Dockerfile.worker -t ghcr.io/${{ github.repository }}/worker:latest .
          docker build -f docker/Dockerfile.generator -t ghcr.io/${{ github.repository }}/generator:latest .

      - name: Push images
        run: |
          docker push ghcr.io/${{ github.repository }}/api:latest
          docker push ghcr.io/${{ github.repository }}/worker:latest
          docker push ghcr.io/${{ github.repository }}/generator:latest
